name: PyStand

on:
  push:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:   # 手动触发

env:
  BUILD_TYPE: Release

jobs:
  # ---------- MSVC (Ninja) ----------
  build-msvc:
    if: github.event.pull_request.draft == false
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [ Win32, x64 ]
        subsystem: [ GUI, CLI ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'x64' && 'x64' || 'x86' }}

      - name: Install Ninja (if missing)
        run: choco install ninja -y

      - name: Configure
        run: >
          cmake
          -G "Ninja"
          -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          ${{ matrix.subsystem == 'GUI' && '-DPYSTAND_CONSOLE=OFF' || '-DPYSTAND_CONSOLE=ON' }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PyStand-${{ matrix.arch }}-${{ matrix.subsystem }}
          path: build/${{ env.BUILD_TYPE }}

  # ---------- GCC (MinGW) ----------
  build-gcc:
    if: github.event.pull_request.draft == false
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        sys: [ mingw32, mingw64 ]
        subsystem: [ GUI, CLI ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup WinLibs
        run: |
          if ( '${{ matrix.sys }}' -eq 'mingw32' ) {
            $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/7.5.0-7.0.0-r1/winlibs-i686-posix-dwarf-gcc-7.5.0-mingw-w64-7.0.0-r1.7z"
          } else {
            $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/7.5.0-7.0.0-r1/winlibs-x86_64-posix-seh-gcc-7.5.0-mingw-w64-7.0.0-r1.7z"
          }
          Invoke-WebRequest -Uri $url -OutFile ${{ matrix.sys }}.7z
          7z x ${{ matrix.sys }}.7z
          echo "${{ github.workspace }}\${{ matrix.sys }}\bin" >> $env:GITHUB_PATH

      - name: Configure
        run: >
          cmake
          -G "MinGW Makefiles"
          -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          ${{ matrix.subsystem == 'GUI' && '-DPYSTAND_CONSOLE=OFF' || '-DPYSTAND_CONSOLE=ON' }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PyStand-${{ matrix.sys }}-${{ matrix.subsystem }}
          path: build/PyStand.exe

  # ---------- Release ----------
  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    needs: [ build-msvc, build-gcc ]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files
        run: ls -R

      - name: Create archives
        run: >
          7z a PyStand-v${{ github.ref_name }}-exe.zip
          PyStand-Win32-CLI PyStand-Win32-GUI
          PyStand-x64-CLI PyStand-x64-GUI
          PyStand-mingw32-CLI PyStand-mingw32-GUI
          PyStand-mingw64-CLI PyStand-mingw64-GUI

      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: PyStand*.zip
